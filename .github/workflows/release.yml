name: 构建并发布

on:
  push:
    tags:
      - 'v*' # 匹配所有以 v 开头的 tag，包括 v1.0.0, v1.0.0-beta, v1.0.0-rc.1 等

permissions:
  contents: write

jobs:
  build-and-release:
    name: 构建与发布
    runs-on: ubuntu-latest

    steps:
      - name: 检出后端代码
        uses: actions/checkout@v4

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: 生成 Wire 注入代码
        run: |
          go install github.com/google/wire/cmd/wire@v0.7.0
          $(go env GOPATH)/bin/wire ./internal/di
      
      - name: 获取元数据 (版本号/时间/类型)
        id: meta
        run: |
          # 提取 tag 名称 (例如 v1.0.0 或 v1.1-beta.1)
          VERSION=${GITHUB_REF#refs/tags/}
          
          # 生成构建时间
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_OUTPUT
          
          # 判断是否为预发布 (包含 -beta 或 -rc)
          if [[ $VERSION == *"-beta"* ]] || [[ $VERSION == *"-rc"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "Mode: Beta/Pre-release"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "Mode: Official Release"
          fi

      - name: 创建构建目录
        run: mkdir -p build_artifacts

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: 编译前端项目 (注入版本)
        run: |
          cd web
          pnpm install --frozen-lockfile
          
          export VITE_APP_VERSION="${{ steps.meta.outputs.VERSION }}"
          export VITE_UI_HASH="${{ github.sha }}"
          export VITE_BUILD_TIME="${{ steps.meta.outputs.BUILD_TIME }}"
          
          pnpm build

      - name: 嵌入前端资源
        run: |
          # 清理并复制
          rm -rf frontend/*
          cp -r web/dist/* frontend/
          touch frontend/.keep

      - name: 准备 Go LDFLAGS
        id: ldflags
        run: |
          VERSION="${{ steps.meta.outputs.VERSION }}"
          TIME="${{ steps.meta.outputs.BUILD_TIME }}"
          COMMIT="${{ github.sha }}"
          
          FLAGS="-s -w \
            -X 'main.AppVersion=${VERSION}' \
            -X 'main.BuildTime=${TIME}' \
            -X 'main.GitCommit=${COMMIT}' \
            -X 'main.FrontendVer=${COMMIT}'"
            
          echo "FLAGS=${FLAGS}" >> $GITHUB_OUTPUT

      - name: 构建 (Linux)
        run: |
          # 纯后端版
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${{ steps.ldflags.outputs.FLAGS }}" -o build_artifacts/perfect-pic-${{ steps.meta.outputs.VERSION }}-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "${{ steps.ldflags.outputs.FLAGS }}" -o build_artifacts/perfect-pic-${{ steps.meta.outputs.VERSION }}-linux-arm64 .
          
          # 全栈版 (Embed)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags embed -ldflags "${{ steps.ldflags.outputs.FLAGS }}" -o build_artifacts/perfect-pic-${{ steps.meta.outputs.VERSION }}-embed-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags embed -ldflags "${{ steps.ldflags.outputs.FLAGS }}" -o build_artifacts/perfect-pic-${{ steps.meta.outputs.VERSION }}-embed-linux-arm64 .

      - name: 构建 (Windows)
        run: |
          # 纯后端版
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "${{ steps.ldflags.outputs.FLAGS }}" -o build_artifacts/perfect-pic-${{ steps.meta.outputs.VERSION }}-windows-amd64.exe .
          
          # 全栈版 (Embed)
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -tags embed -ldflags "${{ steps.ldflags.outputs.FLAGS }}" -o build_artifacts/perfect-pic-${{ steps.meta.outputs.VERSION }}-embed-windows-amd64.exe .

      # --- 上传发布 ---
      - name: 创建 Release 并上传附件
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build_artifacts/*
          draft: true
          prerelease: ${{ steps.meta.outputs.IS_PRERELEASE }}
          generate_release_notes: true
